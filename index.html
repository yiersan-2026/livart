
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵匠 - AI 时代的创意匠人画布</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 TensorFlow.js 和 Selfie Segmentation 用于本地快速抠图 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/selfie-segmentation@1.0.1/dist/selfie_segmentation.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #fcfcfc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        }
        #root {
            height: 100vh;
        }
        .canvas-grid {
            background-size: 30px 30px;
            background-image: radial-gradient(circle, #eef0f2 1px, transparent 1px);
        }
        .checkered-bg {
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%), 
                              linear-gradient(-45deg, #eee 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #eee 75%), 
                              linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #6366f1, transparent);
            box-shadow: 0 0 15px #6366f1;
            position: absolute;
            width: 100%;
            z-index: 10;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        /* 抠图模式下的主体高亮样式 (蓝色棋盘感) */
        .mask-overlay-blue {
            background: rgba(99, 102, 241, 0.4);
            mix-blend-mode: multiply;
        }
        /* 隐藏 TFJS 加载时的 console 噪音 */
        .tfjs-hidden { display: none; }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="canvas-grid">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
