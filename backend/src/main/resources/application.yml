server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: livart-backend
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:app}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        concurrency: 1
        max-concurrency: 1
        prefetch: 1
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2
          max-interval: 10000ms

mybatis-plus:
  type-handlers-package: com.artisanlab.common
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

artisan:
  auth:
    jwt-secret: ${JWT_SECRET:dev-only-change-me-livart-jwt-secret-at-least-32-chars}
    jwt-ttl-days: ${JWT_TTL_DAYS:30}
  canvas:
    default-canvas-id: ${CANVAS_ID:00000000-0000-0000-0000-000000000001}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  minio:
    endpoint: ${MINIO_ENDPOINT:}
    access-key: ${MINIO_ACCESS_KEY:}
    secret-key: ${MINIO_SECRET_KEY:}
    bucket: ${MINIO_BUCKET:livart}
  ai:
    default-base-url: ${LIVART_DEFAULT_API_BASE_URL:}
    default-api-key: ${LIVART_DEFAULT_API_KEY:}
    default-image-model: ${LIVART_DEFAULT_IMAGE_MODEL:gpt-image-2}
    default-chat-model: ${LIVART_DEFAULT_CHAT_MODEL:gpt-5.5}
  rabbitmq:
    canvas-save-queue: ${CANVAS_SAVE_QUEUE:livart.canvas.save.dev}
    canvas-save-dead-letter-queue: ${CANVAS_SAVE_DEAD_LETTER_QUEUE:livart.canvas.save.dev.dead}

logging:
  level:
    com.artisanlab: INFO
