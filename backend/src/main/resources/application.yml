server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: livart-backend
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    listener:
      simple:
        auto-startup: ${SPRING_RABBITMQ_LISTENER_SIMPLE_AUTO_STARTUP:true}
        concurrency: 1
        max-concurrency: 1
        prefetch: 1
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2
          max-interval: 10000ms

mybatis-plus:
  type-handlers-package: com.artisanlab.common
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

artisan:
  canvas:
    default-canvas-id: ${CANVAS_ID:00000000-0000-0000-0000-000000000001}
  ai:
    default-base-url: ${LIVART_DEFAULT_API_BASE_URL:}
    default-api-key: ${LIVART_DEFAULT_API_KEY:}
    default-image-model: ${LIVART_DEFAULT_IMAGE_MODEL:gpt-image-2}
    default-chat-model: ${LIVART_DEFAULT_CHAT_MODEL:gpt-5.5}

logging:
  level:
    com.artisanlab: INFO
