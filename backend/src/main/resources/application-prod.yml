server:
  port: ${SERVER_PORT:18180}

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT_MS:3000ms}

artisan:
  auth:
    jwt-secret: ${JWT_SECRET}
    jwt-ttl-days: ${JWT_TTL_DAYS:30}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://livart.suntools.pro}
  minio:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET:livart}
  rabbitmq:
    canvas-save-queue: ${CANVAS_SAVE_QUEUE:livart.canvas.save.prod}
    canvas-save-dead-letter-queue: ${CANVAS_SAVE_DEAD_LETTER_QUEUE:livart.canvas.save.prod.dead}
