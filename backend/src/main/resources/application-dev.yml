server:
  port: ${SERVER_PORT:8080}

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:app}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT_MS:3000ms}

artisan:
  auth:
    jwt-secret: ${JWT_SECRET:dev-only-change-me-livart-jwt-secret-at-least-32-chars}
    jwt-ttl-days: ${JWT_TTL_DAYS:30}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://127.0.0.1:8080}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:livartminio}
    secret-key: ${MINIO_SECRET_KEY:livart_minio_change_me}
    bucket: ${MINIO_BUCKET:livart}
  rabbitmq:
    canvas-save-queue: ${CANVAS_SAVE_QUEUE:livart.canvas.save.dev}
    canvas-save-dead-letter-queue: ${CANVAS_SAVE_DEAD_LETTER_QUEUE:livart.canvas.save.dev.dead}
