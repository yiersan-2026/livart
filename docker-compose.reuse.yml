services:
  livart:
    build:
      context: .
      dockerfile: Dockerfile
    image: livart:latest
    ports:
      - "${LIVART_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: 8080
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-app}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?Please set DB_PASSWORD in .env}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-host.docker.internal}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?Please set RABBITMQ_PASSWORD in .env}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://host.docker.internal:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?Please set MINIO_ACCESS_KEY in .env}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?Please set MINIO_SECRET_KEY in .env}
      MINIO_BUCKET: ${MINIO_BUCKET:-livart}
      JWT_SECRET: ${JWT_SECRET:?Please set JWT_SECRET in .env}
      JWT_TTL_DAYS: ${JWT_TTL_DAYS:-30}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      LIVART_DEFAULT_API_BASE_URL: ${LIVART_DEFAULT_API_BASE_URL:-}
      LIVART_DEFAULT_API_KEY: ${LIVART_DEFAULT_API_KEY:-}
      LIVART_DEFAULT_IMAGE_MODEL: ${LIVART_DEFAULT_IMAGE_MODEL:-gpt-image-2}
      LIVART_DEFAULT_CHAT_MODEL: ${LIVART_DEFAULT_CHAT_MODEL:-gpt-5.5}
      CANVAS_SAVE_QUEUE: ${CANVAS_SAVE_QUEUE:-livart.canvas.save}
      CANVAS_SAVE_DEAD_LETTER_QUEUE: ${CANVAS_SAVE_DEAD_LETTER_QUEUE:-livart.canvas.save.dead}
      WAIT_TIMEOUT_SECONDS: ${WAIT_TIMEOUT_SECONDS:-120}
      LOG_PATH: ${LOG_PATH:-/tmp/livart-logs}
      LOG_MAX_HISTORY: ${LOG_MAX_HISTORY:-1}
      LOG_TOTAL_SIZE_CAP: ${LOG_TOTAL_SIZE_CAP:-200MB}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 5
    restart: unless-stopped
